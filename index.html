<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandwich Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sandwich-grid > div {
            transition: all 200ms ease-in-out;
        }

        .sandwich-grid > div:hover {
            border-color: #22c55e;
            transform: scale(1.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-100 p-8">

    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8 uppercase tracking-wide">
        Sandwich Maker
    </h1>
    <h1 class="text-1xl font-bold text-center text-gray-800 mb-8 tracking-wide">
        Pick your build and start making your sandwich!
    </h1>

    <div class=" grid grid-cols-9 grid-rows-1 gap-4 p-4 rounded-xl mb-1 *:border *:border-gray-500 *:rounded-md *:p-2 *:flex *:items-center *:justify-center *:transition-all *:duration-200 *:hover:border-green-500 font-bold bg-white shadow-sm">
        <div class="col-span-2 bg-yellow-100">BREAD</div>
        <div class="col-span-3 col-start-3 bg-yellow-100">PROTEIN</div>
        <div class="col-span-4 col-start-6 bg-yellow-100">VEGE & SAUCES</div>
    </div>

    <div class="sandwich-grid grid grid-cols-9 grid-rows-6 gap-4 p-4 rounded-xl shadow-sm *:border *:border-gray-500 *:rounded-md *:p-2 *:flex *:items-center *:justify-center *:transition-all *:duration-200 *:ease-in-out *:cursor-pointer">
        <div id="bread-italian" class="col-span-2 row-start-1">italian</div>
        <div id="bread-wheat" class="col-span-2 col-start-1 row-start-2">wheat</div>
        <div id="bread-parmesan" class="col-span-2 col-start-1 row-start-3">parmesan</div>
        <div id="bread-honey-oat" class="col-span-2 col-start-1 row-start-4">honey oat</div>
        <div id="bread-italian-herbs" class="col-span-2 col-start-1 row-start-5">italian herbs</div>
        <div class="col-span-1 col-start-1 row-start-6 font-bold bg-yellow-100 hover:scale-100">CHEESE</div>
        
        <div class="col-start-3 row-start-1">6</div>
        <div class="col-start-4 row-start-1">7</div>
        <div class="col-start-3 row-start-2">8</div>
        <div class="col-start-4 row-start-2">9</div>
        <div class="col-start-3 row-start-3">10</div>
        <div class="col-start-4 row-start-3">11</div>
        <div class="col-start-3 row-start-4">12</div>
        <div class="col-start-4 row-start-4">13</div>
        <div class="col-start-3 row-start-5">14</div>
        <div class="col-start-4 row-start-5">15</div>
        <div class="col-start-5 row-start-1">16</div>
        <div class="col-start-5 row-start-2">17</div>
        
        <div class="col-span-2 col-start-6 row-start-1">18</div>
        <div class="col-start-8 row-start-1">19</div>
        <div class="col-start-9 row-start-1">20</div>
        <div class="col-start-6 row-start-2">21</div>
        <div class="col-start-7 row-start-2">22</div>
        <div class="col-start-8 row-start-2">23</div>
        <div class="col-start-9 row-start-2">24</div>
        <div class="col-start-6 row-start-3">25</div>
        <div class="col-start-7 row-start-3">26</div>
        <div class="col-start-8 row-start-3">27</div>
        <div class="col-start-9 row-start-3">28</div>
        
        <div class="col-start-3 row-start-6">29</div>
        <div class="col-start-4 row-start-6">30</div>
        <div class="col-start-5 row-start-6">31</div>
        <div class="col-start-6 row-start-6">32</div>
        <div class="col-start-7 row-start-6">33</div>
        <div class="col-start-8 row-start-6">34</div>
        <div class="col-start-9 row-start-6">35</div>
        
        <div class="col-start-6 row-start-4">36</div>
        <div class="col-start-7 row-start-4">37</div>
        <div class="col-start-8 row-start-4">38</div>
        <div class="col-start-9 row-start-4">39</div>
        <div class="col-start-6 row-start-5">40</div>
        <div class="col-start-7 row-start-5">41</div>
        <div class="col-start-8 row-start-5">42</div>
        <div class="col-start-9 row-start-5">43</div>
        <div class="col-start-2 row-start-6">45</div>
    </div>

    <div class=" grid grid-cols-9 grid-rows-1 gap-4 p-4  rounded-xl mb-1 *:border *:border-gray-500 *:rounded-md *:p-2 *:flex *:items-center *:justify-center *:transition-all *:duration-200 *:hover:border-green-500 bg-white shadow-sm">
        <button id="button-reset" type="button" class="col-span-4 col-start-6 bg-yellow-100 hover:bg-yellow-200 active:scale-95 active:bg-yellow-300 active:border-yellow-500 active:shadow-inner transition-all duration-200 ease-in-out active:font-bold">
                RESET 
        </button>
    </div>

</body>
</html>
